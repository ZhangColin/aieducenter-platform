# 开发环境 Docker Compose 配置
# 使用方式: docker-compose -f docker-compose.dev.yml up -d

# 声明额外的构建上下文（Docker BuildKit）
# 允许访问 ../cartisan-boot 目录
# 使用方式：docker buildx bake -f docker-compose.dev.yml [target]

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: aiedu-postgres-dev
    environment:
      POSTGRES_DB: aieducenter
      POSTGRES_USER: aiedu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev123}
    ports:
      - "5433:5432"  # 宿主机 5433 -> 容器 5432（避开本地 pg）
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiedu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiedu-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: aiedu-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aiedu-network

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        CARTISAN_BOOT_PATH: ../cartisan-boot
    container_name: aiedu-backend-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aieducenter
      SPRING_DATASOURCE_USERNAME: aiedu
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dev123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiedu-network
    restart: unless-stopped

  # Web 前端
  web:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.web
    container_name: aiedu-web-dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080  # 浏览器端访问（用于参考）
      BACKEND_URL: http://backend:8080  # 服务端代理访问（Docker 内部网络）
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aiedu-network
    restart: unless-stopped

  # Admin 前端
  admin:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.admin
    container_name: aiedu-admin-dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080  # 浏览器端访问（用于参考）
      BACKEND_URL: http://backend:8080  # 服务端代理访问（Docker 内部网络）
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - aiedu-network
    restart: unless-stopped

volumes:
  postgres-dev-data:
  redis-dev-data:

networks:
  aiedu-network:
    driver: bridge
