# 测试环境 Docker Compose 配置

services:
  # PostgreSQL 测试数据库
  postgres:
    image: postgres:16-alpine
    container_name: aiedu-postgres-test
    environment:
      POSTGRES_DB: aieducenter_test
      POSTGRES_USER: aiedu_test
      POSTGRES_PASSWORD: test123
    ports:
      - "5434:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiedu_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiedu-test-network

  # Redis 测试
  redis:
    image: redis:7-alpine
    container_name: aiedu-redis-test
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-test-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aiedu-test-network

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: aiedu-backend-test
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aieducenter_test
      SPRING_DATASOURCE_USERNAME: aiedu_test
      SPRING_DATASOURCE_PASSWORD: test123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiedu-test-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Web 前端
  web:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.web
    container_name: aiedu-web-test
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
      BACKEND_URL: http://backend:8080
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - aiedu-test-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Admin 前端
  admin:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.admin
    container_name: aiedu-admin-test
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081
      BACKEND_URL: http://backend:8080
    ports:
      - "3003:3001"
    depends_on:
      - backend
    networks:
      - aiedu-test-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-test-data:
  redis-test-data:

networks:
  aiedu-test-network:
    driver: bridge
