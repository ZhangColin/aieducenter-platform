server:
  port: 8080

spring:
  application:
    name: aieducenter-platform

  # 激活的配置（默认 local，部署时通过环境变量覆盖）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # 数据源驱动
  datasource:
    driver-class-name: org.postgresql.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate  # 使用 Flyway 管理 schema
    show-sql: false

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
